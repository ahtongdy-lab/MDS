<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Display Majlis Daerah Simunjan - Full Premium with Ticker</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{overflow:hidden;color:white;}
.fullscreen{
    width:100vw;
    height:100vh;
    position:relative;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    background-size:cover;
    background-position:center;
    transition:background 1s ease-in-out;
}

/* Logo animasi halus */
.logo{
    position:absolute;
    top:20px;
    left:20px;
    width:100px;
    animation:logoBounce 3s infinite alternate;
}
@keyframes logoBounce{
    0%{transform:translateY(0);}
    50%{transform:translateY(-5px);}
    100%{transform:translateY(0);}
}

/* Jam Digital */
.clock{
    position:absolute;
    top:20px;
    right:20px;
    font-size:24px;
    font-weight:600;
    text-shadow:2px 2px 4px #000;
}

/* Header Text */
.fullscreen h1{font-size:50px;margin-bottom:8px;text-shadow:2px 2px 6px #000;}
.fullscreen h2{font-size:34px;margin-bottom:20px;opacity:0.9;text-shadow:1px 1px 4px #000;}

/* Slider Box */
.slider{
    width:80%;
    max-width:1000px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    border-radius:20px;
    padding:30px;
    text-align:center;
    animation: fadeUp 1.5s ease;
}
.slider h3{font-size:28px;margin-bottom:8px;}
.slider p{font-size:20px;}

/* Countdown */
.countdown{
    margin-top:20px;
    font-size:28px;
    font-weight:700;
    background: rgba(0,0,0,0.6);
    padding:10px 20px;
    border-radius:15px;
}

/* Ticker info pantas */
.ticker{
    position:absolute;
    bottom:0;
    width:100%;
    background:rgba(0,0,0,0.75);
    padding:10px 0;
    overflow:hidden;
    white-space:nowrap;
    font-weight:600;
}
.ticker span{
    display:inline-block;
    padding-left:100%;
    animation:tickerMove 20s linear infinite;
}
@keyframes tickerMove{
    0%{transform:translateX(0);}
    100%{transform:translateX(-100%);}
}

/* Animasi */
@keyframes fadeUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}

/* Responsive */
@media screen and (max-width:1024px){
    .fullscreen h1{font-size:38px;}
    .fullscreen h2{font-size:26px;}
    .slider h3{font-size:24px;}
    .slider p{font-size:18px;}
    .clock{font-size:20px;}
    .countdown{font-size:24px;}
}
@media screen and (max-width:768px){
    .fullscreen h1{font-size:30px;}
    .fullscreen h2{font-size:22px;}
    .slider h3{font-size:20px;}
    .slider p{font-size:16px;}
    .clock{font-size:18px;}
    .countdown{font-size:20px;}
}
</style>
</head>
<body>

<div class="fullscreen" id="fullscreen">
    <img class="logo" src="logomds.png" alt="Logo Majlis">

    <div class="clock" id="clock"></div>

    <h1>MAJLIS DAERAH SIMUNJAN</h1>
    <h2>Berita & Info Aktiviti Staf</h2>

    <div class="slider" id="slider"></div>

    <div class="countdown" id="countdown"></div>

    <div class="ticker"><span id="tickerText"></span></div>
</div>

<script>
// Background slideshow
const backgrounds = [
    'https://images.unsplash.com/photo-1573164713988-8665fc963095',
    'https://images.unsplash.com/photo-1581090700227-1e37b190418e', 
    'https://images.unsplash.com/photo-1600880292203-757bb62b4baf'
];
let bgIndex = 0;
const fullscreen = document.getElementById('fullscreen');
setInterval(()=>{
    bgIndex = (bgIndex +1) % backgrounds.length;
    fullscreen.style.backgroundImage = `url('${backgrounds[bgIndex]}')`;
},8000);

// Slider berita & aktiviti
const displayData = [
    {tajuk:"Program Komuniti 2026",isi:"Aktiviti bersama penduduk berjaya dijalankan oleh staf Majlis."},
    {tajuk:"Operasi Pembersihan Bandar",isi:"Kerja pembersihan illegal dumping dilakukan oleh pasukan Majlis."},
    {tajuk:"Mesyuarat Staf Bulanan",isi:"Mesyuarat diadakan bagi memastikan kelancaran operasi jabatan."},
    {tajuk:"Kempen Bandar Bersih",isi:"Staf Majlis mengadakan kempen kebersihan di kawasan utama."},
    {tajuk:"Latihan Staf Baharu",isi:"Latihan induksi untuk staf baharu berjaya dilaksanakan."},
    {tajuk:"Kedatangan Staf MDS",isi:"ENCIK NUEL SILA HADIR DENGAN SEGERA, JANGAN KANJI GILAK."}
];
let current = 0;
const slider = document.getElementById("slider");
function showSlide(i){
    const data = displayData[i];
    slider.innerHTML = `<h3>${data.tajuk}</h3><p>${data.isi}</p>`;
}
showSlide(current);
setInterval(()=>{
    current = (current +1) % displayData.length;
    showSlide(current);
},5000);

// Jam Digital realtime
function updateClock(){
    const now = new Date();
    const h = now.getHours().toString().padStart(2,'0');
    const m = now.getMinutes().toString().padStart(2,'0');
    const s = now.getSeconds().toString().padStart(2,'0');
    document.getElementById('clock').innerText = `${h}:${m}:${s}`;
}
updateClock();
setInterval(updateClock,1000);

// Countdown untuk beberapa acara
const events = [
    {name:"Mesyuarat Staf Bulanan", date:new Date("2026-04-01T09:00:00")},
    {name:"Kempen Bandar Bersih", date:new Date("2026-04-05T10:00:00")},
    {name:"Program Komuniti 2026", date:new Date("2026-04-10T08:30:00")}
];
let eventIndex = 0;
const countdownElem = document.getElementById("countdown");
function updateCountdown(){
    if(events.length===0) return;
    const now = new Date();
    const event = events[eventIndex];
    let diff = event.date - now;
    if(diff <=0){
        countdownElem.innerText = `📢 ${event.name} Sedang Berlangsung!`;
    } else {
        const days = Math.floor(diff/(1000*60*60*24));
        const hours = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
        const minutes = Math.floor((diff%(1000*60*60))/(1000*60));
        const seconds = Math.floor((diff%(1000*60))/1000);
        countdownElem.innerText = `📅 ${event.name} dalam: ${days}d ${hours}h ${minutes}m ${seconds}s`;
    }
}
// Bergilir antara acara setiap 10 saat
updateCountdown();
setInterval(()=>{
    eventIndex = (eventIndex+1) % events.length;
    updateCountdown();
},10000);
setInterval(updateCountdown,1000);

// Ticker info pantas
const tickerData = [
    "Info Staf: Latihan induksi selesai • ",
    "Info Staf: Mesyuarat mingguan berjaya • ",
    "Info Staf: Kempen kebersihan berjalan lancar • ",
    "Info Staf: Operasi pembersihan illegal dumping selesai • "
];
document.getElementById('tickerText').innerText = tickerData.join('');
</script>

</body>
</html>
