<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Display Majlis Daerah Simunjan - Logo Center</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{overflow:hidden;color:white;}
.fullscreen{
    width:100vw;
    height:100vh;
    position:relative;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    background-size:cover;
    background-position:center;
    transition:background 1s ease-in-out;
}

/* Logo Majlis di tengah halaman */
.logo{
    width:150px;
    margin-bottom:20px;
    animation:logoBounce 3s infinite alternate;
}
@keyframes logoBounce{
    0%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
    100%{transform:translateY(0);}
}

/* Jam Digital */
.clock{
    font-size:24px;
    font-weight:600;
    text-shadow:2px 2px 4px #000;
    margin-bottom:15px;
}

/* Header Text */
.fullscreen h1{font-size:50px;margin-bottom:8px;text-shadow:2px 2px 6px #000;}
.fullscreen h2{font-size:34px;margin-bottom:20px;opacity:0.9;text-shadow:1px 1px 4px #000;}

/* Slider Box */
.slider{
    width:80%;
    max-width:1000px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    border-radius:20px;
    padding:30px;
    text-align:center;
    animation: fadeUp 1.5s ease;
}
.slider h3{font-size:28px;margin-bottom:8px;}
.slider p{font-size:20px;}

/* Countdown */
.countdown{
    margin-top:20px;
    font-size:28px;
    font-weight:700;
    background: rgba(0,0,0,0.6);
    padding:10px 20px;
    border-radius:15px;
}

/* Ticker info pantas BAWAH */
.ticker{
    position:absolute;
    bottom:0;
    width:100%;
    background:rgba(0,0,0,0.75);
    padding:10px 0;
    overflow:hidden;
    white-space:nowrap;
    font-weight:600;
}
.ticker span{
    display:inline-block;
    padding-left:100%;
    animation:tickerMove 40s linear infinite; /* perlahan & smooth */
}
@keyframes tickerMove{
    0%{transform:translateX(0);}
    100%{transform:translateX(-100%);}
}

/* Ticker SELAMAT DATANG ATAS */
.ticker.top{
    top:0;
    bottom:auto;
    background:rgba(0,0,0,0.7);
    color:yellow;
}
.ticker.top span{
    display:inline-block;
    padding-left:100%;
    animation:tickerTopMove 30s linear infinite;
}
@keyframes tickerTopMove{
    0%{transform:translateX(100%);}
    100%{transform:translateX(-100%);}
}

/* Animasi */
@keyframes fadeUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}

/* Responsive */
@media screen and (max-width:1024px){
    .fullscreen h1{font-size:38px;}
    .fullscreen h2{font-size:26px;}
    .slider h3{font-size:24px;}
    .slider p{font-size:18px;}
    .clock{font-size:20px;}
    .countdown{font-size:24px;}
    .logo{width:120px;}
}
@media screen and (max-width:768px){
    .fullscreen h1{font-size:30px;}
    .fullscreen h2{font-size:22px;}
    .slider h3{font-size:20px;}
    .slider p{font-size:16px;}
    .clock{font-size:18px;}
    .countdown{font-size:20px;}
    .logo{width:100px;}
}
</style>
</head>
<body>

<div class="fullscreen" id="fullscreen">
    <!-- Ticker SELAMAT DATANG ATAS -->
    <div class="ticker top"><span id="tickerTopText">Selamat Datang ke Pejabat Majlis Daerah Simunjan</span></div>

    <!-- Jam digital di bawah ticker atas -->
    <div class="clock" id="clock"></div>

    <!-- Logo Majlis di tengah -->
    <img class="logo" src="logomds.png" alt="Logo Majlis">

    <h1>MAJLIS DAERAH SIMUNJAN</h1>
    <h2>Berita & Info Aktiviti Staf</h2>

    <!-- Slider Berita & Aktiviti -->
    <div class="slider" id="slider"></div>

    <!-- Countdown -->
    <div class="countdown" id="countdown"></div>

    <!-- Ticker info pantas BAWAH -->
    <div class="ticker"><span id="tickerText"></span></div>
</div>

<script>
// Background slideshow
const backgrounds = ['gambar2.jpeg'];
let bgIndex = 0;
const fullscreen = document.getElementById('fullscreen');
setInterval(()=>{
    bgIndex = (bgIndex +1) % backgrounds.length;
    fullscreen.style.backgroundImage = `url('${backgrounds[bgIndex]}')`;
},8000);

// Slider berita & aktiviti
const displayData = [
    {tajuk:"Program Komuniti 2026",isi:"Aktiviti bersama penduduk berjaya dijalankan oleh staf Majlis."},
    {tajuk:"Operasi Anjir di Kawasan Simunjan",isi:"Kerja-kerja penghapusan segala anjir di kawasan Simunjan dilakukan oleh pasukan Majlis."},
    {tajuk:"Mesyuarat Staf Bulanan",isi:"Mesyuarat diadakan bagi memastikan kelancaran operasi jabatan."},
    {tajuk:"Kempen Bandar Bersih",isi:"Staf Majlis telah mengadakan kempen kebersihan di kawasan utama Pejabat MDS."},
    {tajuk:"Latihan Staf Baharu",isi:"Sila pastikan Borang Latihan dihantar secepat mungkin sebelum 1 Januari 2222."},
    {tajuk:"RUMAH TERBUKA HARI RAYA",isi:"Pihak Majlis akan menganjurkan Rumah Terbuka Hari Raya Aidifitri di Perkarang Pejabat MDS"},
    {tajuk:"NOTIS UNTUK EN.NUEL ANAK AJANG",isi:"SILA BEREHAT DENGAN TENANG"},
    {tajuk:"PARKIR KERETA BERBUMBUNG",isi:"JANGAN PARKIR KENDERAAN ANDA DI SINI SEHINGGA KERJA-KERJA SUDAH SIAP SEPENUHNYA DAN SELAMAT"}
];
let current = 0;
const slider = document.getElementById("slider");
function showSlide(i){
    const data = displayData[i];
    slider.innerHTML = `<h3>${data.tajuk}</h3><p>${data.isi}</p>`;
}
showSlide(current);
setInterval(()=>{
    current = (current +1) % displayData.length;
    showSlide(current);
},5000);

// Jam Digital realtime
function updateClock(){
    const now = new Date();
    const h = now.getHours().toString().padStart(2,'0');
    const m = now.getMinutes().toString().padStart(2,'0');
    const s = now.getSeconds().toString().padStart(2,'0');
    document.getElementById('clock').innerText = `${h}:${m}:${s}`;
}
updateClock();
setInterval(updateClock,1000);

// Countdown untuk beberapa acara
const events = [
    {name:"Mesyuarat Staf Bulanan", date:new Date("2026-03-25T09:00:00")},
    {name:"Kempen Bandar Bersih", date:new Date("2026-03-25T09:00:00")},
    {name:"Program Komuniti 2026", date:new Date("2026-03-25T08:30:00")},
    {name:"TAHUN BARU 2027", date:new Date("2026-12-31T24:00:00")}
];
let eventIndex = 0;
const countdownElem = document.getElementById("countdown");
function updateCountdown(){
    if(events.length===0) return;
    const now = new Date();
    const event = events[eventIndex];
    let diff = event.date - now;
    if(diff <=0){
        countdownElem.innerText = `📢 ${event.name} Sedang Berlangsung!`;
    } else {
        const days = Math.floor(diff/(1000*60*60*24));
        const hours = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
        const minutes = Math.floor((diff%(1000*60*60))/(1000*60));
        const seconds = Math.floor((diff%(1000*60))/1000);
        countdownElem.innerText = `📅 ${event.name} dalam: ${days}d ${hours}h ${minutes}m ${seconds}s`;
    }
}
// Bergilir antara acara setiap 10 saat
updateCountdown();
setInterval(()=>{
    eventIndex = (eventIndex+1) % events.length;
    updateCountdown();
},10000);
setInterval(updateCountdown,1000);

// Ticker info pantas BAWAH
const tickerData = [
    "Info Staf: SELAMAT HARI RAYA AIDILFITRI MAAF ZAHIR DAN BATIN • ",
    "Info Staf: Mesyuarat mingguan berjaya • ",
    "Info Staf: Kempen kebersihan berjalan lancar • ",
    "Info Staf: Operasi pembersihan illegal dumping selesai • ",
    "Info Staf: ROMA SANGAT COMEL & GEMOY • ",
    "Info Staf: Library Ditutup Selama-lamanya kerana isu 12 hari • ",
    "Info Staf: Sila pastikan Claim & TNT dihantar setiap sebelum 15 haribulan • "
];
document.getElementById('tickerText').innerText = tickerData.join('');
</script>

</body>
</html>
